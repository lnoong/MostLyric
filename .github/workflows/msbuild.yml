name: MSBuild

on:
  push:
    branches: [ "main", "master" ]
    tags: [ "v*" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

env:
  SOLUTION_FILE_PATH: MostLyric.sln
  BUILD_CONFIGURATION: Release
  BUILD_PLATFORM: x64
  ARTIFACT_NAME: MostLyric-Release-x64

permissions:
  contents: write

jobs:
  build:
    name: Build Release x64
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Add MSBuild to PATH
        uses: microsoft/setup-msbuild@v2

      - name: Build
        run: >
          msbuild $env:SOLUTION_FILE_PATH
          /m
          /restore
          /p:Configuration=$env:BUILD_CONFIGURATION
          /p:Platform=$env:BUILD_PLATFORM
          /p:BuildInParallel=true
          /p:UseMultiToolTask=true
          /p:EnforceProcessCountAcrossBuilds=true

      - name: Collect artifacts
        shell: pwsh
        run: |
          $output = "build\$env:BUILD_CONFIGURATION\$env:BUILD_PLATFORM"
          $dist = "dist\$env:ARTIFACT_NAME"

          New-Item -ItemType Directory -Force -Path $dist | Out-Null
          Copy-Item "$output\MostLyric.exe" $dist
          Copy-Item "$output\MostLyricHook.dll" $dist

      - name: Package release
        shell: pwsh
        run: |
          Compress-Archive `
            -Path "dist\$env:ARTIFACT_NAME\*" `
            -DestinationPath "dist\$env:ARTIFACT_NAME.zip" `
            -Force

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ARTIFACT_NAME }}
          path: |
            dist/${{ env.ARTIFACT_NAME }}
            dist/${{ env.ARTIFACT_NAME }}.zip
          if-no-files-found: error

      - name: Create GitHub release
        if: startsWith(github.ref, 'refs/tags/v')
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create $env:GITHUB_REF_NAME `
            "dist\$env:ARTIFACT_NAME.zip" `
            --title $env:GITHUB_REF_NAME `
            --notes "Automated Release build for $env:GITHUB_REF_NAME"
